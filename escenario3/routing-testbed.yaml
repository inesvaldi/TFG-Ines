name: routing-testbed

topology:

  kinds:
    linux:
      type: linux-network-multitool
      group: server
      image: wbitt/network-multitool:latest
    arista_ceos:
      type: arista-ceos
      group: router
      image: ceos:4.34.5M
    cisco_csr1000v:
      type: cisco-xe-csr1000v
      group: router
      image: vrnetlab/vr-csr:17.03.04
    ovs-bridge:
      type: ovs-bridge
      group: switch

  nodes:
    pc11:
      kind: linux
    pc12:
      kind: linux
    pc21:
      kind: linux
    pc22:
      kind: linux
    pc31:
      kind: linux
    pc32:
      kind: linux
    s1:
      kind: ovs-bridge
    s2:
      kind: ovs-bridge
    s3:
      kind: ovs-bridge
    r1:
      kind: cisco_csr1000v
      startup-config: r1.txt
    r2:
      kind: arista_ceos
      startup-config: r2.txt
    r3:
      kind: arista_ceos
      startup-config: r3.txt
  links:
    - endpoints: ["pc11:eth1", "s1:s1-eth1"]
    - endpoints: ["pc12:eth1", "s1:s1-eth2"]
    - endpoints: ["s1:s1-eth3", "r1:eth1"]
    - endpoints: ["r1:eth2", "r2:eth2"]
    - endpoints: ["r1:eth3", "r3:eth2"]
    - endpoints: ["r2:eth3", "r3:eth3"]
    - endpoints: ["r2:eth1", "s2:s2-eth3"]
    - endpoints: ["s2:s2-eth1", "pc21:eth1"]
    - endpoints: ["s2:s2-eth2", "pc22:eth1"]
    - endpoints: ["r3:eth1", "s3:s3-eth3"]
    - endpoints: ["s3:s3-eth1", "pc31:eth1"]
    - endpoints: ["s3:s3-eth2", "pc32:eth1"]
